name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest test.py

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_NAME: my-image
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG \
            -t $DOCKERHUB_USERNAME/$IMAGE_NAME:latest .

          docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:latest
        
          outputs:
            image_tag: ${{ steps.meta.outputs.image_tag }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE_TAG=${{ needs.build.outputs.image_tag }}

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-image:$IMAGE_TAG

            docker tag \
              ${{ secrets.DOCKERHUB_USERNAME }}/my-image:$IMAGE_TAG \
              ${{ secrets.DOCKERHUB_USERNAME }}/my-image:latest

            cd ~/cicd-demo-cloned-

            docker compose up -d